[pytest]
# ── Test discovery ──────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ──────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --no-header
    -ra

# ── Markers ─────────────────────────────────────────────
markers =
    unit: Pure unit tests — no Flask, no Anthropic
    integration: Flask test client, Anthropic is mocked
    slow: Tests that take more than 1 second

# ── Environment ─────────────────────────────────────────
env =
    FLASK_ENV=testing
